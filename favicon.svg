<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)" />

  <!-- Chart bars -->
  <rect x="10" y="40" width="8" height="14" rx="2" fill="url(#accentGrad)" opacity="0.6"/>
  <rect x="21" y="32" width="8" height="22" rx="2" fill="url(#accentGrad)" opacity="0.8"/>
  <rect x="32" y="24" width="8" height="30" rx="2" fill="url(#accentGrad)"/>

  <!-- Trend line -->
  <polyline
    points="10,38 21,30 32,22 46,12"
    stroke="url(#greenGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Trend dot at the tip -->
  <circle cx="46" cy="12" r="3.5" fill="#34d399"/>

  <!-- Dollar sign -->
  <text x="45" y="52" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="url(#accentGrad)">$</text>
</svg>